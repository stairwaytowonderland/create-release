name: Release a Version

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      secret-token-name:
        description: 'Name of the repository secret containing the GitHub Personal Access Token with permissions to create issues (e.g. GH_PAT_CREATE_ISSUE)'
        required: true
        type: string
        default: 'GITHUB_TOKEN'
  workflow_call:
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'
        required: false

env:
  TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Set TOKEN env var
        run: |
          if [ -n "${{ secrets.github-token }}" ]; then
            echo "TOKEN=${{ secrets.github-token }}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.inputs.secret-token-name }}" ]; then
            echo "TOKEN=${{ secrets[github.event.inputs.secret-token-name] }}" >> $GITHUB_ENV
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ env.TOKEN }}

      - name: Semantic Release
        id: release
        uses: stairwaytowonderland/node-semantic-release@main
        with:
          github-token: ${{ env.TOKEN }}

      - name: Dispatch Publish Workflow
        if: steps.release.outputs.new-release-published == 'true'
        uses: stairwaytowonderland/simple-workflow-dispatch@main
        with:
          workflow: publish.yaml
          tag: ${{ steps.release.outputs.new-release-git-tag }}
          fields: |
            notes-b64=${{ steps.release.outputs.new-release-notes-base64 }}
