name: Publish a Release

on:
  # Fires when a tag matching v* is pushed with personal credentials.
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      secret-token-name:
        description: 'Name of the repository secret containing the GitHub Personal Access Token with permissions to create issues (e.g. GH_PAT_CREATE_ISSUE)'
        required: true
        type: string
        default: 'GITHUB_TOKEN'
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        required: false

  workflow_call:
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'
        required: false
    inputs:
      tag:
        type: string
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
      notes-b64:
        type: string
        description: 'Base64-encoded release notes (Markdown)'
        required: false

env:
  TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Set TOKEN env var
        run: |
          if [ -n "${{ secrets.github-token }}" ]; then
            echo "TOKEN=${{ secrets.github-token }}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.inputs.secret-token-name }}" ]; then
            echo "TOKEN=${{ secrets[github.event.inputs.secret-token-name] }}" >> $GITHUB_ENV
          fi

      # Resolve the tag from whichever trigger fired:
      #   push: tags                        → github.ref_name  (e.g. v1.2.3)
      #   workflow_dispatch / workflow_call → inputs.tag
      - name: Setup | Resolve Tag
        id: vars
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Checkout at the input tag so setuptools-scm sees it and stamps the
      # correct version into the wheel metadata.
      - name: Setup | Checkout Release Tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 0
          token: ${{ env.TOKEN }}

      - name: Decode Release Notes
        if: inputs.notes-b64 != ''
        run: printf '%s' "$NOTES_B64" | base64 -d > release-notes.md
        env:
          NOTES_B64: ${{ inputs.notes-b64 }}

      - name: Create Release
        run: |
          if [ -f release-notes.md ]; then
            gh release create "${{ steps.vars.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --title "${{ steps.vars.outputs.tag }}" \
              --notes-file release-notes.md
          else
            gh release create "${{ steps.vars.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --title "${{ steps.vars.outputs.tag }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ env.TOKEN }}
